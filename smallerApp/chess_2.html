<html>
    <head>
        <title>Chess Analysis</title>
        <!-- Use a local server (e.g. `npm run dev` in this folder) so ES modules, Stockfish worker, and WASM load correctly. -->
        <link rel="stylesheet" href="chess-review-offline.css">
        <script type="module" src="main.js"></script>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <div class="column-left">
                <div class="panel-title">Game</div>

                <div id="board-wrap" class="board-wrap">
                    <div id="board" class="board"></div>
                </div>

                <p id="chess-status" class="chess-status" aria-live="polite"></p>

                <div class="pgn-container">
                    <label class="pgn-holder">
                        FEN
                        <input id="fen" type="text" placeholder="Paste FEN…" size="80">
                    </label>
                    <button id="load-fen-btn" type="button" class="pgn-load-button">Load FEN</button>
                </div>

                <div class="pgn-container">
                    <label class="pgn-holder">
                        Trainer PGN (main line)
                        <textarea id="pgn" rows="5" cols="72" placeholder="Paste PGN…"></textarea>
                    </label>
                    <button id="load-pgn-btn" type="button" class="pgn-load-button">Load trainer PGN</button>
                </div>

                <div class="pgn-container">
                    <label class="pgn-holder">
                        Computer opening PGN (optional)
                        <textarea id="computer-pgn" rows="4" cols="72" placeholder="Separate line for opponent moves; overrides trainer at each ply when set."></textarea>
                    </label>
                    <button id="load-computer-pgn-btn" type="button" class="pgn-load-button">Load computer opening</button>
                    <button id="clear-computer-pgn-btn" type="button" class="pgn-load-button">Clear computer opening</button>
                </div>

                <div class="trainer-controls">
                    <label><input type="radio" name="learner" id="learner-white" value="w" checked> I play White</label>
                    <label><input type="radio" name="learner" id="learner-black" value="b"> I play Black</label>
                    <p class="trainer-hint">Black rotates the board; pieces are moved under the cursor correctly.</p>
                    <label><input type="checkbox" id="strict-opening"> Strict opening line (reject other legal moves; auto-reply from line)</label>
                </div>

                <div class="autoplay-controls">
                    <label><input type="checkbox" id="auto-play"> Auto-play vs computer (Stockfish)</label>
                    <label class="autoplay-depth-label">Strength (depth)
                        <select id="auto-play-depth">
                            <option value="5">5 — Fast</option>
                            <option value="8">8 — Easy</option>
                            <option value="12" selected>12 — Medium</option>
                            <option value="16">16 — Strong</option>
                            <option value="20">20 — Maximum</option>
                        </select>
                    </label>
                </div>

                <div class="opening-controls">
                    <label class="opening-label">My opening
                        <select id="opening-mine"><option value="">— None —</option></select>
                    </label>
                    <label class="opening-label">Computer opening
                        <select id="opening-computer"><option value="">— None —</option></select>
                    </label>
                    <button id="apply-openings-btn" type="button" class="pgn-load-button">Apply openings</button>
                </div>

                <div class="trainer-actions">
                    <button id="undo-btn" type="button">Undo</button>
                    <button id="reset-btn" type="button">New game</button>
                </div>
            </div>

            <div class="column-middle">
                <div class="panel-title">Analysis</div>
                <div class="analysis" id="analysis"></div>
            </div>

            <aside class="column-chat" id="chat-column">
                <div id="ollama-root"></div>
            </aside>
        </div>
    </body>
</html>
